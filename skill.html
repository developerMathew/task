        </div>
    </div>
    <script>
        const words = ["HTML", "CSS", "JAVASCRIPT", "BOOTSTRAP", "JQUERY", "EXPRESS JS", "MONGO DB"];
        let i = 0;
        let j = 0;
        let currentWord = '';
        let isDeleting = false;
        const speed = 100;

        function type() {
            currentWord = words[i];
            if (isDeleting) {
                j--;
            } else {
                j++;
            }

            document.getElementById('typewriter').textContent = currentWord.substring(0, j);

            if (!isDeleting && j === currentWord.length) {
                isDeleting = true;
                setTimeout(type, 3000);
            } else if (isDeleting && j === 0) {
                isDeleting = false;
                i = (i + 1) % words.length;
                setTimeout(type, 300);
            } else {
                setTimeout(type, isDeleting ? speed / 1 : speed);
            }
        }

        type();
    </script>
    <script>
        let menuList = document.getElementById("menuList")
        menuList.style.maxHeight = "0px";
        function toggleMenu() {
            if (menuList.style.maxHeight == "0px") {
                menuList.style.maxHeight = "500px";
            }
            else {
                menuList.style.maxHeight = "0px"
            }
        }

    </script>
